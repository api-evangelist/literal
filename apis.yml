aid: literal
name: Literal Club
description: Literal is a modern social reading and book tracking platform that provides
  a GraphQL API for managing reading lists, reviews, shelves, reading goals, highlights,
  and book recommendations. The API enables developers to access user libraries, reading
  states, book data, author information, and social reading clubs.
